<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intro to DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body
    class="p-3 mb-2 bg-info-subtle text-info-emphasis d-flex justify-content-center align-items-center flex-column gap-3 vh-100">
    <h1>Intro to DOM</h1>
    <h2>Meet Barnaby 😺</h2>
    <h1 id="emoji">😺</h1>
    <h3 id="status">Status: Starving</h3>
    <div><button type="button" class="btn btn-danger" onclick="feed()">Feed Cookie 🍪</button></div>
    <script>
        function feed(){
            document.getElementById("emoji").innerText= "😻"
            document.getElementById("status").innerText= "Status: Happy and Fed!"
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
