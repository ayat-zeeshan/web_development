<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography in CSS</title>
    <style>
        h1 {
            font-weight: 800;
            text-align: center;
            color: rgb(174, 5, 5);
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 3rem;
        }

        h2 {
            font-weight: 500;
            text-align: center;
            color: darkblue;
            font-family: fantasy;
        }

        * {
            text-align: center;

        }

        h4 {
            font-weight: 400;
            color: blue;
            font-family: fantasy;

        }

        p {
            font-family: cursive;
        }

        h3 {
            color: rgb(3, 162, 3);
        }

        #box {
            border: 1px solid;
            padding: 10px;
            box-shadow: 20px 20px #888888;
            background-color: blanchedalmond;
            width: 400px;



        }

        body {
            background-color: rgb(10, 10, 148);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>

</head>

<body>

    <div id="box">
        <h1>WANTED</h1>
        <h2>Sir Waffles</h2>
        <h4>The notorious Sock thief</h4>
        <p>Last seen dragging a perfectly good pair of argyle socks under the sofa. Do not attempt to apprehend
            on your own.
            Approach with extreme caution; suspect is armed with devastating puppy-dog eyes.</p>
        <h3><u>Reward: 500 treats</u></h3>
    </div>

</body>

</html>
