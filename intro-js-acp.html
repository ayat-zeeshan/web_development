<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intro to JS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Intro to JS</h1>
    <label for="num1">Enter value for num1</label>
    <input type="number" name="num1" id="num1"><br><br>
    <label for="num2">Enter value for num2</label>
    <input type="number" name="num2" id="num2"><br>
    <p id="output"></p>
    <button type="button" class="btn btn-warning" onclick="add()">Add</button>
   

    
    <button type="button" class="btn btn-success" onclick="subtract()">subtract</button>
    
    
   
    <button type="button" class="btn btn-primary" onclick="multiply()">multiply</button>
    
    
    
    <button type="button" class="btn btn-danger" onclick="divide()">divide</button>

    <button type="button" class="btn btn-primary" onclick="square()">Square num1</button>
    <button type="button" class="btn btn-danger" onclick="multiply3()"> Multiply num1 by 3</button>
    <button type="button" class="btn btn-success" onclick="cube()">Cube of num1</button>
    <button type="button" class="btn btn-warning" onclick="evenorodd()">Is num1 even or odd?</button>
    <script>
        function add() {
            let num1 = Number(document.getElementById("num1").value)
            let num2 = Number(document.getElementById("num2").value)

            document.getElementById("output").innerHTML = `the addition of ${num1} and ${num2} is  ${num1 + num2}`
        }
        function subtract() {

            let num1 = Number(document.getElementById("num1").value)
            let num2 = Number(document.getElementById("num2").value)
            document.getElementById("output").innerHTML =
                `The subtraction of ${num1} and ${num2} is ${num1 - num2}`
        }
        function multiply() {
                let num1 = Number(document.getElementById("num1").value)
                let num2 = Number(document.getElementById("num2").value)
                document.getElementById("output").innerHTML =
                    `The multiplication of ${num1} and ${num2} is ${num1 * num2}`
            }

    function divide() {
        let num1 = Number(document.getElementById("num1").value)
        let num2 = Number(document.getElementById("num2").value)
        document.getElementById("output").innerHTML =
            `The multiplication of ${num1} and ${num2} is ${num1 / num2}`
    }
    function multiply3() {
        let num1 = Number(document.getElementById("num1").value)
        document.getElementById("output").innerHTML =
            `Multiplying num1 by 3 gives you ${num1} and 3 is ${num1 * 3}`
    }
    function square() {
        let num1 = Number(document.getElementById("num1").value)
        document.getElementById("output").innerHTML =
            `The square of num1 is ${num1 * num1}`
    }
    function cube() {
        let num1 = Number(document.getElementById("num1").value)
        document.getElementById("output").innerHTML =
            `The cube of num1 is ${num1 * num1 * num1}`
    }
    
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
