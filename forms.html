<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in Html</title>
</head>
<body>
   <h1>Personal Details Form</h1> 
   <form>
    <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Name: </label>
        <input type="text" placeholder="Enter Name"><br><br>
        <label for="email">Email: </label>
        <input type="email" name="email" id="email" placeholder="Enter your email"><br><br>
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Enter your password"><br><br>
        <label for="gender">Gender:  </label><br>
        <label for="female">female</label>
        <input type="radio" name="gender" id="female"><br>
        <label for="male">male</label>
        <input type="radio" name="gender" id="male"><br><br>
       
        
        
    </fieldset>
    <fieldset>
        <legend>Favourite City</legend>
        <label for="Favourite City"></label>
        <input type="checkbox" name="london" id="city">
        <label for="London">London</label><br>
        <input type="checkbox" name="bristol" id="city">
        <label for="bristol">Bristol</label><br>
        <input type="checkbox" name="edinburgh" id="city">
        <label for="edinburgh">Edinburgh</label>
    </fieldset>
    <fieldset>
        <legend>Education</legend>
        <label for="Maths"><b><mark>Maths</mark></b></label><br>
        <input type="radio" name="maths" id="maths">
        <label for="maths">0-30 marks</label><br>
        <input type="radio" name="maths" id="maths">
        <label for="maths">31-59 marks</label><br>
    <input type="radio" name="maths" id="maths">
    <label for="maths">60-85 marks</label><br>
    <input type="radio" name="maths" id="maths">
    <label for="maths">86-100 marks</label><br><br>
    
    <label for="eng"><b><mark>English</mark></b></label><br>
    <input type="radio" name="eng" id="eng">
    <label for="eng">0-30 marks</label><br>
    <input type="radio" name="eng" id="eng">
    <label for="eng">31-59 marks</label><br>
    <input type="radio" name="eng" id="eng">
    <label for="eng">60-85 marks</label><br>
    <input type="radio" name="eng" id="eng">
    <label for="eng">86-100 marks</label><br><br>
    
    <label for="his"><b><mark>History</mark></b></label><br>
    <input type="radio" name="his" id="his">
    <label for="his">0-30 marks</label><br>
    <input type="radio" name="his" id="his">
    <label for="his">31-59 marks</label><br>
    <input type="radio" name="his" id="his">
    <label for="his">60-85 marks</label><br>
    <input type="radio" name="his" id="his">
    <label for="his">86-100 marks</label><br><br>

    <label for="geo"><b><mark>Geography</mark></b></label><br>
    <input type="radio" name="geo" id="geo">
    <label for="geo">0-30 marks</label><br>
    <input type="radio" name="geo" id="geo">
    <label for="geo">31-59 marks</label><br>
    <input type="radio" name="geo" id="geo">
    <label for="geo">60-85 marks</label><br>
    <input type="radio" name="geo" id="geo">
    <label for="geo">86-100 marks</label><br>




        
    </fieldset> 
    <button>Submit</button>       
   </form> 

   
</body>
</html>
