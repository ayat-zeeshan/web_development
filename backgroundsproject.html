<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgrounds Projects</title>
    <style>
        #linear {
            height: 200px;
            width: 300px;

            background: linear-gradient(to bottom right, blue, purple, rgb(10, 102, 93), rgb(102, 139, 102));
            border: 5px solid rgb(255, 130, 13);

            font-family: cursive;
            text-align: center;
            color: azure;

        }

        #radial {
            height: 200px;
            width: 300px;

                        background: radial-gradient(circle, rgb(255, 251, 0), rgb(115, 140, 238), rgb(142, 238, 129));
                        border: 5px solid purple;

            font-family: cursive;
            text-align: center;
            color: azure;
            font-size: large;
        }
        #image {
            height: 500px;
            width: 300px;
            background-image: url("monika-grabkowska-tv-d1R3FItE-unsplash (1).jpg");
            background-repeat: no-repeat;
            border: 5px solid rgb(23, 255, 15);
            background-size: cover;

        }
    </style>

</head>

<body>
    <h2 id="linear">Linear Backgrounds</h2>
    <div id="radial">Radial Backgrounds</div>
    <h3 id="image">Background Image</h3>
</body>

</html>
