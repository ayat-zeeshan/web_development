<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
<h1>Arrays and Objects</h1>

<label>Name:</label>
<input type="text" id="nameBox"><br><br>

<label>Grade:</label>
<input type="text" id="gradeBox"><br><br>

<label>Form:</label>
<input type="text" id="formBox"><br><br>

<button onclick="add()">Add Student</button>
<button onclick="remove()">Remove Last</button>

<p id="output"></p>

<script>
    var students = ["Zara , Grade 9 , 9HA"];

    document.getElementById("output").innerHTML = students.join("<br>");

    function add() {
        var name = document.getElementById("nameBox").value;
        var grade = document.getElementById("gradeBox").value;
        var form = document.getElementById("formBox").value;

        var student = name + " , " + grade + " , " + form;

        students.push(student);

        document.getElementById("output").innerHTML = students.join("<br>");
    }

    function remove() {
        students.pop();
        document.getElementById("output").innerHTML = students.join("<br>");
    }
</script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
