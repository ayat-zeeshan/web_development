<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="d-flex justify-content-center align-items-center flex-column">
    <H1>Containers</H1>
    <div class="container p-3 mb-2 bg-primary text-white d-flex justify-content-center align-items-center flex-column">
        <h3>Standard. Container</h3>
        <p>I have margins on the sides.</p>
        <button type="button" class="btn btn-light">Button</button>
        <span class="badge rounded-pill text-bg-dark">badge</span>
    </div>

    <div class="container-fluid p-3 mb-2 bg-success text-white justify-content-center align-items-center flex-column">
        <h3>Full.container-fluid</h3>
        <p>I always touch the edges of the screen!</p>
        <div class="progress" role="progressbar" aria-label="Warning example" aria-valuenow="75" aria-valuemin="0"
            aria-valuemax="100">
            <div class="progress-bar bg-warning" style="width: 75%"></div>
        </div>
    </div>

    <div class="container-lg p-3 mb-2 bg-danger text-white d-flex justify-content-center align-items-center flex-column">
<h3>Conditional.container-lg</h3>
<p>I'm full-width on mobile, but boxed on desktops.</p>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
