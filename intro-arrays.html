<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intro to arrays</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Intro to arrays</h1>
    <p id="output"></p>
    <button type="button" class="btn btn-danger" onclick="remove()">Remove a language</button>
    <script>
        var programming_languages = ["Python", "JS", "C++", "Java", "Kotlin", "Ruby"]
        
        document.getElementById("output").innerHTML = programming_languages.join(" , ")
        function remove() {
            programming_languages.pop()
            document.getElementById("output").innerHTML = programming_languages.join(" , ")

        }

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
